name: Build FFmpeg Plugin

on:
  push:
    paths:
      - 'Cargo.toml'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check_tag.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists. Skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION does not exist. Proceeding with release."
          fi

  update-plugin-json:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update plugin.json version
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          jq --arg v "$VERSION" '.version = $v' plugin.json > plugin.json.tmp && mv plugin.json.tmp plugin.json
          
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Bump plugin.json version to ${{ needs.check-version.outputs.version }}"
          file_pattern: 'plugin.json'

      - name: Create Tag
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.check-version.outputs.version }}';
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/v${version}`,
              sha: context.sha
            })

  build:
    needs: [check-version, update-plugin-json]
    if: needs.check-version.outputs.should_release == 'true'
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ffmpeg-utils-windows-x64
            ffmpeg_url: "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ffmpeg-utils-linux-x64
            ffmpeg_url: "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: ffmpeg-utils-linux-arm64
            ffmpeg_url: "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-arm64-static.tar.xz"
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross

      - name: Build Plugin DLL
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Download FFmpeg
        shell: bash
        run: |
          mkdir -p bin
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            curl -L -o ffmpeg.zip "${{ matrix.ffmpeg_url }}"
            7z x ffmpeg.zip
            mv ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe bin/
            mv ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe bin/
          else
            curl -L -o ffmpeg.tar.xz "${{ matrix.ffmpeg_url }}"
            tar -xf ffmpeg.tar.xz
            # Find directory name (it varies by version)
            DIR=$(find . -maxdepth 1 -type d -name "ffmpeg-*-static")
            mv "$DIR/ffmpeg" bin/
            mv "$DIR/ffprobe" bin/
            chmod +x bin/ffmpeg
            chmod +x bin/ffprobe
          fi

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p package
          cp plugin.json package/
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/ffmpeg_utils.dll package/
            cp bin/ffmpeg.exe package/
            cp bin/ffprobe.exe package/
          else
            cp target/${{ matrix.target }}/release/libffmpeg_utils.so package/ffmpeg_utils.so
            cp bin/ffmpeg package/
            cp bin/ffprobe package/
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          files: package/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
