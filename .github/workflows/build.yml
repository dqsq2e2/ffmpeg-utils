name: Build FFmpeg Plugin

on:
  push:
    paths:
      - "Cargo.toml"
      - "plugin.yml"
      - "src/**"
      - ".github/workflows/build.yml"
      - ".github/trpack/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.check_tag.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@v5

      - name: Get Version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n 1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check Tag
        id: check_tag
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  tag:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync plugin.yml Version
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          export VERSION
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("plugin.yml")
          text = path.read_text(encoding="utf-8")
          text = re.sub(r"^version:\s*.*$", f"version: {os.environ['VERSION']}", text, flags=re.M)
          path.write_text(text, encoding="utf-8")
          PY

          if ! git diff --quiet -- plugin.yml; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add plugin.yml
            git commit -m "chore: Bump plugin.yml version to $VERSION"
            git push
          fi

      - name: Create Tag
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          git tag "v$VERSION" "$(git rev-parse HEAD)"
          git push origin "refs/tags/v$VERSION"

  build:
    needs: [check-version, tag]
    if: needs.check-version.outputs.should_release == 'true'
    name: Build ${{ matrix.platform_tag }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform_tag: windows-x86_64
            artifact_name: ffmpeg_utils.dll
            entry_point: ffmpeg_utils.dll
            ffmpeg_url: https://github.com/dqsq2e2/ffmpeg-build/releases/download/v8.1.2-2/ffmpeg-8.1.2-audio-encode-x86_64-w64-mingw32.tar.gz
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform_tag: linux-x86_64
            artifact_name: libffmpeg_utils.so
            entry_point: libffmpeg_utils.so
            ffmpeg_url: https://github.com/dqsq2e2/ffmpeg-build/releases/download/v8.1.2-2/ffmpeg-8.1.2-audio-encode-x86_64-linux-gnu.tar.gz
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform_tag: linux-aarch64
            artifact_name: libffmpeg_utils.so
            entry_point: libffmpeg_utils.so
            ffmpeg_url: https://github.com/dqsq2e2/ffmpeg-build/releases/download/v8.1.2-2/ffmpeg-8.1.2-audio-encode-arm64-linux-gnu.tar.gz
            use_cross: true

    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ needs.check-version.outputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross

      - name: Build Native Library
        shell: bash
        run: |
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "${{ matrix.entry_point }}"

      - name: Download FFmpeg
        shell: bash
        run: |
          mkdir -p bin
          curl -L -o ffmpeg.tar.gz "${{ matrix.ffmpeg_url }}"
          tar -xf ffmpeg.tar.gz
          DIR=$(find . -maxdepth 1 -type d -name "ffmpeg-*" | head -n 1)
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "$DIR/bin/ffmpeg.exe" bin/
            cp "$DIR/bin/ffprobe.exe" bin/
          else
            cp "$DIR/bin/ffmpeg" bin/
            cp "$DIR/bin/ffprobe" bin/
            chmod +x bin/ffmpeg bin/ffprobe
          fi

      - name: Prepare Manifest
        shell: bash
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          ENTRY_POINT: ${{ matrix.entry_point }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("plugin.yml")
          text = path.read_text(encoding="utf-8")
          text = re.sub(r"^version:\s*.*$", f"version: {os.environ['VERSION']}", text, flags=re.M)
          text = re.sub(r"^entry_point:\s*.*$", f"entry_point: {os.environ['ENTRY_POINT']}", text, flags=re.M)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Package .tr
        shell: bash
        env:
          TRPACK_SIGNING_KEY: ${{ secrets.TRPACK_SIGNING_KEY }}
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            TRPACK=".github/trpack/windows-x86_64/trpack.exe"
          else
            TRPACK=".github/trpack/linux-x86_64/trpack"
            chmod +x "$TRPACK"
          fi

          mkdir -p dist
          SIGN_ARGS=()
          if [[ -n "${TRPACK_SIGNING_KEY:-}" ]]; then
            printf '%s' "$TRPACK_SIGNING_KEY" > .trpack-signing-key.json
            SIGN_ARGS=(--sign-key .trpack-signing-key.json)
          else
            echo "::warning::TRPACK_SIGNING_KEY secret is not set; building unsigned package"
          fi

          OUT="dist/ffmpeg-utils-${{ needs.check-version.outputs.version }}-${{ matrix.platform_tag }}.tr"
          "$TRPACK" validate .
          "$TRPACK" build . --include bin --platform-tag "${{ matrix.platform_tag }}" --output "$OUT" "${SIGN_ARGS[@]}"
          "$TRPACK" verify "$OUT"

      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: ffmpeg-utils-${{ matrix.platform_tag }}
          path: dist/*.tr
          retention-days: 1

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          files: artifacts/*.tr
