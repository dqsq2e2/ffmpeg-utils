name: Build FFmpeg Plugin

on:
  push:
    paths:
      - 'Cargo.toml'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check_tag.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists. Skipping release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION does not exist. Proceeding with release."
          fi

  update-plugin-json:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update plugin.json version
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          jq --arg v "$VERSION" '.version = $v' plugin.json > plugin.json.tmp && mv plugin.json.tmp plugin.json
          
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Bump plugin.json version to ${{ needs.check-version.outputs.version }}"
          file_pattern: 'plugin.json'

      - name: Create Tag
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.check-version.outputs.version }}';
            let sha = '${{ steps.auto_commit.outputs.commit_hash }}';
            if (!sha) {
              sha = context.sha;
            }
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/v${version}`,
              sha: sha
            })

  build:
    needs: [check-version, update-plugin-json]
    if: needs.check-version.outputs.should_release == 'true'
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ffmpeg-utils-windows-x86_64
            ffmpeg_url: "https://github.com/dqsq2e2/ffmpeg-build/releases/download/v8.0-7/ffmpeg-8.0-audio-x86_64-w64-mingw32.tar.gz"
            use_cross: false
            zip_name: ffmpeg-utils-windows-x86_64.zip
            entry_point: ffmpeg_utils.dll
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ffmpeg-utils-linux-x86_64
            ffmpeg_url: "https://github.com/dqsq2e2/ffmpeg-build/releases/download/v8.0-7/ffmpeg-8.0-audio-x86_64-linux-gnu.tar.gz"
            use_cross: false
            zip_name: ffmpeg-utils-linux-x86_64.zip
            entry_point: libffmpeg_utils.so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: ffmpeg-utils-linux-aarch64
            ffmpeg_url: "https://github.com/dqsq2e2/ffmpeg-build/releases/download/v8.0-7/ffmpeg-8.0-audio-arm64-linux-gnu.tar.gz"
            use_cross: true
            zip_name: ffmpeg-utils-linux-aarch64.zip
            entry_point: libffmpeg_utils.so

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.check-version.outputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross

      - name: Build Plugin DLL
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Download FFmpeg
        shell: bash
        run: |
          mkdir -p bin
          
          # All URLs are tar.gz from custom build
          curl -L -o ffmpeg.tar.gz "${{ matrix.ffmpeg_url }}"
          tar -xf ffmpeg.tar.gz
          
          # The directory structure from custom build:
          # ffmpeg-8.0-audio-x86_64-w64-mingw32/bin/ffmpeg.exe
          # ffmpeg-8.0-audio-x86_64-linux-gnu/bin/ffmpeg
          
          # Find the extracted directory (starts with ffmpeg-)
          DIR=$(find . -maxdepth 1 -type d -name "ffmpeg-*" | head -n 1)
          echo "Found FFmpeg directory: $DIR"
          
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            # Windows: Check inside bin/
            # Your custom build puts binaries in bin/
            mv "$DIR/bin/ffmpeg.exe" bin/
            mv "$DIR/bin/ffprobe.exe" bin/
          else
            # Linux: Check inside bin/
            mv "$DIR/bin/ffmpeg" bin/
            mv "$DIR/bin/ffprobe" bin/
            chmod +x bin/ffmpeg
            chmod +x bin/ffprobe
          fi

      - name: Package Plugin
        shell: bash
        run: |
          mkdir -p package
          cp plugin.json package/
          
          # Use jq to update the entry_point in plugin.json
          jq --arg entry "${{ matrix.entry_point }}" '.entry_point = $entry' package/plugin.json > package/plugin.json.tmp && mv package/plugin.json.tmp package/plugin.json

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/ffmpeg_utils.dll package/
            cp bin/ffmpeg.exe package/
            cp bin/ffprobe.exe package/
            
            # Create Zip
            cd package
            7z a ../${{ matrix.zip_name }} *
          else
            cp target/${{ matrix.target }}/release/libffmpeg_utils.so package/libffmpeg_utils.so
            cp bin/ffmpeg package/
            cp bin/ffprobe package/
            
            # Create Zip
            cd package
            zip -r ../${{ matrix.zip_name }} *
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}
          retention-days: 1

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
